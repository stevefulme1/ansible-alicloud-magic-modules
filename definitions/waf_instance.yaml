name: WafInstance
module_name: alicloud_waf_instance
description: "Manage WAF (Web Application Firewall) instances"
product: waf-openapi
api_version: "2021-10-01"
create_action: CreateInstance
update_action: ModifyInstance
delete_action: DeleteInstance
describe_action: DescribeInstance
id_field: InstanceId
name_field: InstanceName
generate_info: true
endpoint_template: "wafopenapi.{region}.aliyuncs.com"
doc_url: "https://www.alibabacloud.com/help/en/waf/developer-reference/api-waf-openapi-2021-10-01-createinstance"
properties:
  instance_name:
    type: str
    required: false
    description: "The name of the WAF instance"
    api_field: InstanceName
    updatable: true
  package_code:
    type: str
    required: false
    description: "The package code for the WAF instance"
    api_field: PackageCode
    updatable: false
  plan:
    type: str
    required: false
    description: "The billing plan for the WAF instance"
    choices:
      - monthly
      - yearly
    api_field: Plan
    updatable: false
  region_id:
    type: str
    required: false
    description: "The region ID for the WAF instance"
    api_field: RegionId
    updatable: false
