name: EventBridgeBus
module_name: alicloud_eventbridge_bus
description: "Manage EventBridge event buses"
product: EventBridge
api_version: "2020-04-01"
create_action: CreateEventBus
update_action: UpdateEventBus
delete_action: DeleteEventBus
describe_action: ListEventBuses
list_action: ListEventBuses
id_field: EventBusName
name_field: EventBusName
generate_info: true
endpoint_template: "eventbridge.{region}.aliyuncs.com"
doc_url: "https://www.alibabacloud.com/help/en/eventbridge/developer-reference/api-eventbridge-2020-04-01-createeventbus"
properties:
  event_bus_name:
    type: str
    required: true
    description: "The name of the event bus"
    api_field: EventBusName
    updatable: false
  description:
    type: str
    required: false
    description: "The description of the event bus"
    api_field: Description
    updatable: true
  tags:
    type: list
    required: false
    description: "Tags for the event bus as a list of Key/Value dicts"
    api_field: Tags
    elements: dict
    updatable: true
    suboptions:
      key:
        type: str
        required: true
        description: "Tag key"
      value:
        type: str
        required: false
        description: "Tag value"
