name: PaiNotebook
module_name: alicloud_pai_notebook
description: "Manage PAI-DSW notebook instances for interactive development"
product: PaiDsw
api_version: "2022-01-01"
create_action: CreateInstance
update_action: ModifyInstance
delete_action: DeleteInstance
list_action: ListInstances
id_field: InstanceId
name_field: InstanceName
generate_info: true
endpoint_template: "pai-dsw.{region}.aliyuncs.com"
doc_url: "https://www.alibabacloud.com/help/en/pai/developer-reference/api-pai-dsw-2022-01-01-createinstance"
properties:
  instance_name:
    type: str
    required: true
    description: "The name of the notebook instance"
    api_field: InstanceName
    updatable: true
  workspace_id:
    type: str
    required: true
    description: "The ID of the workspace to which the instance belongs"
    api_field: WorkspaceId
    updatable: false
  ecs_spec:
    type: str
    required: true
    description: "The ECS instance specification, e.g. ecs.gn6i-c4g1.xlarge"
    api_field: EcsSpec
    updatable: true
  image_id:
    type: str
    required: false
    description: "The ID of the image to use"
    api_field: ImageId
    updatable: true
  image_url:
    type: str
    required: false
    description: "The URL of a custom image to use"
    api_field: ImageUrl
    updatable: true
  user_vpc:
    type: dict
    required: false
    description: "The VPC configuration including vpc_id, vswitch_id, and security_group_id"
    api_field: UserVpc
    updatable: false
  datasets:
    type: list
    required: false
    description: "The list of datasets to mount to the instance"
    api_field: Datasets
    updatable: true
  labels:
    type: dict
    required: false
    description: "The labels for the instance as key-value pairs"
    api_field: Labels
    updatable: true
