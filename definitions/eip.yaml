name: Eip
module_name: alicloud_eip
description: "Manage Alibaba Cloud Elastic IP addresses"
product: Vpc
api_version: "2016-04-28"
create_action: AllocateEipAddress
update_action: ModifyEipAddressAttribute
delete_action: ReleaseEipAddress
describe_action: DescribeEipAddresses
list_action: DescribeEipAddresses
id_field: AllocationId
name_field: Name
generate_info: true
doc_url: "https://www.alibabacloud.com/help/en/vpc/developer-reference/api-vpc-2016-04-28-allocateeipaddress"
properties:
  bandwidth:
    type: int
    required: false
    description: "The maximum bandwidth of the EIP in Mbit/s"
    api_field: Bandwidth
    updatable: true
  internet_charge_type:
    type: str
    required: false
    description: "The metering method of the EIP"
    api_field: InternetChargeType
    updatable: false
    choices:
      - PayByTraffic
      - PayByBandwidth
  isp:
    type: str
    required: false
    description: "The line type"
    api_field: ISP
    updatable: false
    choices:
      - BGP
      - BGP_PRO
  eip_name:
    type: str
    required: false
    description: "The name of the EIP"
    api_field: Name
    updatable: true
  description:
    type: str
    required: false
    description: "The description of the EIP"
    api_field: Description
    updatable: true
  tags:
    type: list
    required: false
    description: "The tags of the EIP as a list of dicts with Key and Value"
    api_field: Tag
    updatable: true
