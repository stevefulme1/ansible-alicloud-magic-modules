name: AlbLoadBalancer
module_name: alicloud_alb_load_balancer
description: "Manage ALB (Application Load Balancer) load balancers"
product: Alb
api_version: "2020-06-16"
create_action: CreateLoadBalancer
update_action: UpdateLoadBalancerAttribute
delete_action: DeleteLoadBalancer
describe_action: ListLoadBalancers
list_action: ListLoadBalancers
id_field: LoadBalancerId
name_field: LoadBalancerName
generate_info: true
endpoint_template: "alb.{region}.aliyuncs.com"
doc_url: "https://www.alibabacloud.com/help/en/alb/developer-reference/api-alb-2020-06-16-createloadbalancer"
properties:
  load_balancer_name:
    type: str
    required: true
    description: "The name of the ALB load balancer"
    api_field: LoadBalancerName
    updatable: true
  vpc_id:
    type: str
    required: true
    description: "The ID of the VPC"
    api_field: VpcId
    updatable: false
  address_type:
    type: str
    required: true
    description: "The address type of the load balancer"
    choices:
      - Internet
      - Intranet
    api_field: AddressType
    updatable: false
  load_balancer_edition:
    type: str
    required: true
    description: "The edition of the ALB load balancer"
    choices:
      - Basic
      - Standard
      - WAF
    api_field: LoadBalancerEdition
    updatable: false
  zone_mappings:
    type: list
    required: true
    description: "The zones and vSwitches for the load balancer"
    api_field: ZoneMappings
    elements: dict
    updatable: false
    suboptions:
      zone_id:
        type: str
        required: true
        description: "The zone ID"
      vswitch_id:
        type: str
        required: true
        description: "The vSwitch ID in the zone"
  deletion_protection_enabled:
    type: bool
    required: false
    description: "Whether deletion protection is enabled"
    api_field: DeletionProtectionEnabled
    updatable: true
