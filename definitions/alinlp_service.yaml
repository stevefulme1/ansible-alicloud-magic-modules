name: AlinlpService
module_name: alicloud_alinlp_service
description: "Manage custom NLP services"
product: alinlp
api_version: "2020-06-29"
create_action: CreateService
update_action: UpdateService
delete_action: DeleteService
list_action: ListServices
id_field: ServiceId
name_field: ServiceName
generate_info: true
endpoint_template: "alinlp.{region}.aliyuncs.com"
doc_url: "https://www.alibabacloud.com/help/en/nlp/developer-reference/api-alinlp-2020-06-29-createservice"
properties:
  service_name:
    type: str
    required: true
    description: "The name of the NLP service"
    api_field: ServiceName
    updatable: true
  service_type:
    type: str
    required: true
    description: "The type of NLP service"
    api_field: ServiceType
    updatable: false
    choices:
      - NER
      - Sentiment
      - Classification
      - TextSimilarity
  description:
    type: str
    required: false
    description: "The description of the NLP service"
    api_field: Description
    updatable: true
  model_id:
    type: str
    required: false
    description: "The ID of the trained NLP model"
    api_field: ModelId
    updatable: true
  custom_dict_id:
    type: str
    required: false
    description: "The ID of the custom dictionary"
    api_field: CustomDictId
    updatable: true
