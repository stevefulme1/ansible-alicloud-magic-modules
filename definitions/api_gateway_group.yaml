name: ApiGatewayGroup
module_name: alicloud_api_gateway_group
description: "Manage API Gateway groups"
product: CloudAPI
api_version: "2016-07-14"
create_action: CreateApiGroup
update_action: ModifyApiGroup
delete_action: DeleteApiGroup
describe_action: DescribeApiGroups
list_action: DescribeApiGroups
id_field: GroupId
name_field: GroupName
generate_info: true
endpoint_template: "apigateway.{region}.aliyuncs.com"
doc_url: "https://www.alibabacloud.com/help/en/api-gateway/developer-reference/api-cloudapi-2016-07-14-createapigroup"
properties:
  group_name:
    type: str
    required: true
    description: "The name of the API group"
    api_field: GroupName
    updatable: true
  description:
    type: str
    required: false
    description: "The description of the API group"
    api_field: Description
    updatable: true
  instance_id:
    type: str
    required: false
    description: "The ID of the dedicated API Gateway instance"
    api_field: InstanceId
    updatable: false
