name: PaiTrainingJob
module_name: alicloud_pai_training_job
description: "Manage PAI-DLC distributed training jobs"
product: PaiDlc
api_version: "2020-12-03"
create_action: CreateJob
update_action: UpdateJob
delete_action: DeleteJob
list_action: ListJobs
id_field: JobId
name_field: JobName
generate_info: true
endpoint_template: "pai-dlc.{region}.aliyuncs.com"
doc_url: "https://www.alibabacloud.com/help/en/pai/developer-reference/api-pai-dlc-2020-12-03-createjob"
properties:
  job_name:
    type: str
    required: true
    description: "The name of the training job"
    api_field: JobName
    updatable: false
  workspace_id:
    type: str
    required: true
    description: "The ID of the workspace to which the job belongs"
    api_field: WorkspaceId
    updatable: false
  job_type:
    type: str
    required: true
    description: "The type of the training job, valid values: TFJob, PyTorchJob, XGBoostJob"
    api_field: JobType
    updatable: false
  display_name:
    type: str
    required: false
    description: "The display name of the training job"
    api_field: DisplayName
    updatable: true
  description:
    type: str
    required: false
    description: "The description of the training job"
    api_field: Description
    updatable: true
  job_specs:
    type: list
    required: true
    description: "The list of job specifications, each containing type, image, pod_count, and resource configuration"
    api_field: JobSpecs
    updatable: false
  data_sources:
    type: list
    required: false
    description: "The list of data sources for the training job"
    api_field: DataSources
    updatable: false
  code_source:
    type: dict
    required: false
    description: "The code source configuration for the training job"
    api_field: CodeSource
    updatable: false
  user_command:
    type: str
    required: true
    description: "The command to execute for the training job"
    api_field: UserCommand
    updatable: false
