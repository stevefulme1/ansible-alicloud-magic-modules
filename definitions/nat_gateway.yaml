name: NatGateway
module_name: alicloud_nat_gateway
description: "Manage Alibaba Cloud NAT Gateways"
product: Vpc
api_version: "2016-04-28"
create_action: CreateNatGateway
update_action: ModifyNatGatewayAttribute
delete_action: DeleteNatGateway
describe_action: DescribeNatGateways
list_action: DescribeNatGateways
id_field: NatGatewayId
name_field: NatGatewayName
generate_info: true
endpoint_template: "vpc.{region}.aliyuncs.com"
doc_url: "https://www.alibabacloud.com/help/en/vpc/developer-reference/api-vpc-2016-04-28-createnatgateway"
properties:
  nat_gateway_name:
    type: str
    required: false
    description: "The name of the NAT gateway"
    api_field: NatGatewayName
    updatable: true
  vpc_id:
    type: str
    required: true
    description: "The ID of the VPC where the NAT gateway is created"
    api_field: VpcId
    updatable: false
  vswitch_id:
    type: str
    required: true
    description: "The ID of the vSwitch to which the NAT gateway belongs"
    api_field: VSwitchId
    updatable: false
  nat_type:
    type: str
    required: false
    description: "The type of the NAT gateway"
    api_field: NatType
    updatable: false
    choices:
      - Enhanced
  specification:
    type: str
    required: false
    description: "The specification of the NAT gateway"
    api_field: Spec
    updatable: true
    choices:
      - Small
      - Middle
      - Large
  internet_charge_type:
    type: str
    required: false
    description: "The metering method of the NAT gateway"
    api_field: InternetChargeType
    updatable: false
    choices:
      - PayBySpec
      - PayByLcu
  description:
    type: str
    required: false
    description: "The description of the NAT gateway"
    api_field: Description
    updatable: true
  tags:
    type: list
    required: false
    description: "The tags of the NAT gateway as a list of dicts with Key and Value"
    api_field: Tag
    updatable: true
